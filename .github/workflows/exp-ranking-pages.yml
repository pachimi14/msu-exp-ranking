# Build rankings.json, static web, deploy to GitHub Pages.
# Discord notifications: planned separately.

name: EXP Ranking Pages

# GitHub: Node 20 ベースの Actions 向け（2026年後半に Node 24 が既定になる）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main, master]
    paths:
      - "exp_ranking/**"
      - ".github/workflows/exp-ranking-pages.yml"
  schedule:
    # UTC 00:15 ≒ JST 09:15 (after ranking day rollover at JST 09:00)
    - cron: "15 0 * * *"
  workflow_dispatch:

concurrency:
  group: exp-ranking-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore ranking data cache
        id: ranking_db_cache
        uses: actions/cache/restore@v4
        with:
          path: exp_ranking/bot/data
          key: exp-ranking-data-v3-${{ github.repository }}-meta0
          restore-keys: |
            exp-ranking-data-v3-${{ github.repository }}-meta

      - name: Restore legacy ranking database cache
        uses: actions/cache/restore@v4
        with:
          path: exp_ranking/bot/data/ranking.legacy.db
          key: exp-ranking-db-v2-${{ github.repository }}
          restore-keys: |
            exp-ranking-db-v2-${{ github.repository }}
            exp-ranking-db-${{ github.repository }}

      - name: Log cache restore
        run: |
          echo "cache-hit=${{ steps.ranking_db_cache.outputs.cache-hit }}"
          echo "cache-primary-key=${{ steps.ranking_db_cache.outputs.cache-primary-key }}"
          ls -la exp_ranking/bot/data/ || true
          if [ -f exp_ranking/bot/data/ranking.legacy.db ]; then
            echo "legacy-db-bytes=$(wc -c < exp_ranking/bot/data/ranking.legacy.db)"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: exp_ranking/bot/requirements.txt

      - name: Install bot dependencies
        working-directory: exp_ranking/bot
        run: pip install -r requirements.txt

      - name: Fetch ranking and export JSON
        working-directory: exp_ranking/bot
        env:
          RANKING_MIN_LEVEL: "225"
          RANKING_MAX_PAGES: "600"
          RANKING_REQUEST_DELAY_SEC: "0.35"
          SNAPSHOT_RETENTION_DAYS: "35"
          MVP_HISTORY_DAYS: "35"
          MVP_EXPORT_TOP_N: "0"
          SQLITE_DB_PATH: data/ranking.db
          MVP_JSON_OUTPUT_PATH: ../web/public/data/rankings.json
          CHARACTER_META_JSON_PATH: data/character_meta.json
          NAVIGATOR_REQUEST_DELAY_SEC: "0.35"
          NAVIGATOR_FETCH_ENABLED: "true"
          HYDRATE_META_FROM_PAGES: "true"
          MVP_PAGES_RANKINGS_URL: https://pachimi14.github.io/msu-exp-ranking/data/rankings.json
        run: python main.py

      - name: Count navigator meta for cache key
        id: meta_count
        working-directory: exp_ranking/bot
        run: |
          COUNT=$(python -c "from config import sqlite_db_path; from sqlite_storage import count_character_meta; print(count_character_meta(sqlite_db_path()))")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "character_meta count=$COUNT"

      - name: Save ranking data cache
        if: success() && steps.meta_count.outputs.count != '0'
        uses: actions/cache/save@v4
        with:
          path: exp_ranking/bot/data
          key: exp-ranking-data-v3-${{ github.repository }}-meta${{ steps.meta_count.outputs.count }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: exp_ranking/web/package-lock.json

      - name: Install web dependencies
        working-directory: exp_ranking/web
        run: npm ci

      - name: Build web
        working-directory: exp_ranking/web
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: exp_ranking/web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
