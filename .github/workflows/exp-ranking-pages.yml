# Build rankings.json, static web, deploy to GitHub Pages.
# Discord notifications: planned separately.

name: EXP Ranking Pages

# GitHub: Node 20 ベースの Actions 向け（2026年後半に Node 24 が既定になる）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main, master]
    paths:
      - "exp_ranking/**"
      - ".github/workflows/exp-ranking-pages.yml"
  schedule:
    # UTC 00:15 ≒ JST 09:15 (after ranking day rollover at JST 09:00)
    - cron: "15 0 * * *"
  workflow_dispatch:

concurrency:
  group: exp-ranking-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore ranking database cache
        uses: actions/cache@v4
        with:
          path: exp_ranking/bot/data/ranking.db
          key: exp-ranking-db-${{ github.repository }}
          restore-keys: |
            exp-ranking-db-${{ github.repository }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: exp_ranking/bot/requirements.txt

      - name: Install bot dependencies
        working-directory: exp_ranking/bot
        run: pip install -r requirements.txt

      - name: Fetch ranking and export JSON
        working-directory: exp_ranking/bot
        env:
          RANKING_MIN_LEVEL: "225"
          RANKING_MAX_PAGES: "600"
          RANKING_REQUEST_DELAY_SEC: "0.35"
          SNAPSHOT_RETENTION_DAYS: "35"
          MVP_HISTORY_DAYS: "35"
          MVP_EXPORT_TOP_N: "0"
          SQLITE_DB_PATH: data/ranking.db
          MVP_JSON_OUTPUT_PATH: ../web/public/data/rankings.json
          NAVIGATOR_REQUEST_DELAY_SEC: "0.35"
          NAVIGATOR_FETCH_ENABLED: "true"
        run: python main.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: exp_ranking/web/package-lock.json

      - name: Install web dependencies
        working-directory: exp_ranking/web
        run: npm ci

      - name: Build web
        working-directory: exp_ranking/web
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: exp_ranking/web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
